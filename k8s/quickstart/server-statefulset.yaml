apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire
  labels:
    app: spire-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spire-server
  serviceName: spire-server
  template:
    metadata:
      namespace: spire
      labels:
        app: spire-server
    spec:
      serviceAccountName: spire-server
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: bao-agent
          restartPolicy: Always
          image: quay.io/openbao/openbao:2.1.0
          command: ["bao", "agent", "-config=/etc/bao/agent.hcl"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: spire-bao-agent-config
              mountPath: /etc/bao
            - name: spire-bao-approle
              mountPath: /etc/bao/approle
              readOnly: true
        - name: wait-for-bao-proxy
          image: cgr.dev/chainguard/wait-for-it
          args: ["-t", "90", "127.0.0.1:8200"]
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.11.2
          args:
            - -config
            - /run/spire/config/server.conf
          env:
            - name: VAULT_TOKEN
              value: "unused"
          ports:
            - containerPort: 8081
              name: grpc
            - containerPort: 8008
              name: health
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
              readOnly: false
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: false
          livenessProbe:
            httpGet:
              path: /live
              port: 8008
            failureThreshold: 2
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: spire-oidc
          image: ghcr.io/spiffe/oidc-discovery-provider:1.11.2
          args:
            - -config
            - /run/spire/oidc/config/oidc-discovery-provider.conf
          ports:
            - containerPort: 8080
              name: oidc
          volumeMounts:
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: true
            - name: spire-oidc-config
              mountPath: /run/spire/oidc/config/
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 8009
            failureThreshold: 5
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: spire-config
          configMap:
            name: spire-server
        - name: spire-bao-agent-config
          configMap:
            name: spire-bao-agent-config
        - name: spire-bao-approle
          secret:
            secretName: spire-bao-approle
            items:
              - key: role-id
                path: role-id
              - key: secret-id
                path: secret-id
        - name: spire-server-socket
          emptyDir: {}
        - name: spire-oidc-config
          configMap:
            name: oidc-discovery-provider
  volumeClaimTemplates:
    - metadata:
        name: spire-data
        namespace: spire
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
