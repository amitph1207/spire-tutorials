# OpenBao token for SPIRE UpstreamAuthority "vault".
#
# 1) Create the policy FIRST (your CLI warned it did not exist — that yields 403 on sign-intermediate):
#
#    bao policy write spire-openbao-pki - <<'EOF'
#    path "pki_int/root/sign-intermediate" {
#      capabilities = ["update"]
#    }
#    EOF
#
#    Mount must match server.conf pki_mount_point (here: pki_int).
#
# 2) Mint a token and put it in this Secret:
#
#    bao token create -policy=spire-openbao-pki -ttl=768h -orphan
#
# 3) kubectl apply -f openbao-spire-token-secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: spire-openbao-token
  namespace: spire
type: Opaque
stringData:
  token: s.UF6g6l9XOXvszIJCrZ1NfnY2
