# bao-agent in spire-server pod:
#   AppRole (role-id + secret-id) → login → short-lived OpenBao token (auto-renewed ~every 30m)
#   api_proxy on 127.0.0.1:8200 injects the current token on every request (use_auto_auth_token=force)
#
# SPIRE vault plugin cannot read a token file; it sends a placeholder token to localhost and the
# agent replaces it with the live renewed session token.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-bao-agent-config
  namespace: spire
data:
  agent.hcl: |
    exit_after_auth = false
    pid_file = "/tmp/bao-agent.pid"

    vault {
      address = "http://openbao.default.svc.cluster.local:8200"
    }

    auto_auth {
      method "approle" {
        mount_path = "auth/approle"
        config = {
          role_id_file_path   = "/etc/bao/approle/role-id"
          secret_id_file_path = "/etc/bao/approle/secret-id"
        }
      }
      sink "file" {
        config = {
          path = "/tmp/bao-agent-token"
        }
      }
    }

    listener "tcp" {
      address     = "127.0.0.1:8200"
      tls_disable = true
    }

    api_proxy {
      use_auto_auth_token = "force"
    }
