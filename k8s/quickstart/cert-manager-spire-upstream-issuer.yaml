# ClusterIssuer for SPIRE UpstreamAuthority "cert-manager" (intermediate CA).
# Same auth path as leaf certs: cert-manager → localhost bao-agent → JWT-SVID → remote OpenBao.
# No static OpenBao token (placeholder below; bao-agent use_auto_auth_token=force overrides it).
#
# Apply ONLY AFTER cert-manager controller has spiffe-helper + bao-agent sidecars (for_pod_bao_sidecar Step 3).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: spire-openbao
spec:
  vault:
    server: http://127.0.0.1:8200
    path: pki_int/root/sign-intermediate
    auth:
      tokenSecretRef:
        name: cert-manager-vault-placeholder
        key: token
