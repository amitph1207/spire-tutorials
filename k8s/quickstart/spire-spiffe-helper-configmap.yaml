# spiffe-helper in spire-server pod: JWT-SVID (aud=openbao) for steady-state OpenBao auth.
# Requires spire-agent on the node (hostPath socket) + SPIRE entry for spire-server SA
# (create-spire-server-entry.sh) after first bootstrap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-spiffe-helper-config
  namespace: spire
data:
  helper.conf: |
    agent_address = "/run/spire/sockets/agent.sock"
    cert_dir      = "/var/run/secrets/spiffe.io"
    daemon_mode   = true
    jwt_svids = [
      {
        jwt_audience       = "openbao"
        jwt_svid_file_name = "jwt.token"
      }
    ]
