# AppRole credentials for spire-server bao-agent — NOT the OpenBao session token.
# bao-agent: AppRole login → 1h session token → auto-renew (~30m) → api_proxy injects per SPIRE request.
#
# On OpenBao (once):
#
#   bao auth enable approle 2>/dev/null || true
#
#   bao policy write spire-openbao-pki - <<'EOF'
#   path "pki_int/root/sign-intermediate" {
#     capabilities = ["update"]
#   }
#   EOF
#
#   bao write auth/approle/role/spire-server \
#     secret_id_ttl=0 \
#     token_ttl=1h \
#     token_max_ttl=24h \
#     policies=spire-openbao-pki
#
#   bao read -field=role_id auth/approle/role/spire-server/role-id
#   bao write -f -field=secret_id auth/approle/role/spire-server/secret-id
#
# Paste role-id and secret-id below, then: kubectl apply -f spire-bao-approle-secret.yaml
#
# Secret-ID compromise: bao write auth/approle/role/spire-server/secret-id/destroy secret_id=...
# Mint new secret-id, update this Secret, rollout restart spire-server.
---
apiVersion: v1
kind: Secret
metadata:
  name: spire-bao-approle
  namespace: spire
type: Opaque
stringData:
  role-id: REPLACE_WITH_ROLE_ID
  secret-id: REPLACE_WITH_SECRET_ID
